<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Discovery Feed{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #0a0a0a;
            --ink-2: #2a2a2a;
            --ink-3: #5a5a5a;
            --ink-4: #8a8a8a;
            --paper: #f5f2eb;
            --paper-2: #ece9e0;
            --rule: #0a0a0a;
            --accent: #c41e1e;          /* editorial red */
            --accent-blue: #1a3a6b;    /* broadsheet blue */

            --serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
            --sans: 'Space Grotesk', 'Helvetica Neue', Arial, sans-serif;
            --mono: 'Space Mono', 'Courier New', monospace;

            --page-max: 1280px;
            --gutter: 2rem;
        }

        html { font-size: 18px; }

        body {
            font-family: var(--sans);
            background: var(--paper);
            color: var(--ink);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ─────────── MASTHEAD ─────────── */
        .masthead {
            border-top: 5px solid var(--ink);
            border-bottom: 3px double var(--ink);
            background: var(--paper);
        }
        .masthead-top {
            max-width: var(--page-max);
            margin: 0 auto;
            padding: 1rem var(--gutter) 0.6rem;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: end;
            gap: 1rem;
        }
        .masthead-meta {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--ink-3);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .masthead-meta.right { text-align: right; }
        .masthead-brand {
            text-align: center;
            font-family: var(--serif);
            font-weight: 900;
            font-size: clamp(2.4rem, 5vw, 4.2rem);
            letter-spacing: -0.03em;
            line-height: 1;
            color: var(--ink);
            text-decoration: none;
        }
        .masthead-nav {
            border-top: 1px solid var(--ink);
            margin-top: 0.5rem;
        }
        .masthead-nav-inner {
            max-width: var(--page-max);
            margin: 0 auto;
            padding: 0.35rem var(--gutter);
            display: flex;
            align-items: center;
            gap: 0;
        }
        .masthead-nav a {
            font-family: var(--mono);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--ink);
            text-decoration: none;
            padding: 0.3rem 1.2rem 0.3rem 0;
            border-right: 1px solid var(--ink-4);
            margin-right: 1.2rem;
            transition: color 0.12s;
        }
        .masthead-nav a:last-child { border-right: none; margin-right: 0; }
        .masthead-nav a:hover { color: var(--accent); }
        .masthead-nav .nav-action {
            margin-left: auto;
        }

        /* ─────────── PAGE WRAPPER ─────────── */
        .page {
            max-width: var(--page-max);
            margin: 0 auto;
            padding: 0 var(--gutter);
        }

        /* ─────────── SECTION RULE ─────────── */
        .section-rule {
            border: none;
            border-top: 2px solid var(--ink);
            margin: 1.5rem 0 1rem;
        }
        .section-rule.thin {
            border-top-width: 1px;
            border-color: var(--ink-4);
        }
        .section-label {
            font-family: var(--mono);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--ink-3);
            margin-bottom: 1rem;
        }

        /* ─────────── BUTTONS ─────────── */
        .btn {
            display: inline-block;
            font-family: var(--mono);
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--ink);
            background: var(--ink);
            color: var(--paper);
            cursor: pointer;
            text-decoration: none;
            transition: background 0.12s, color 0.12s;
        }
        .btn:hover { background: var(--accent); border-color: var(--accent); }
        .btn-outline {
            background: transparent;
            color: var(--ink);
        }
        .btn-outline:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

        /* ─────────── DOMAIN BADGE ─────────── */
        .badge {
            display: inline-block;
            font-family: var(--mono);
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 2px 7px;
            border: 1px solid currentColor;
        }
        .badge-tech { color: #1a3a6b; }
        .badge-ai_ml { color: #1a3a6b; }
        .badge-finance, .badge-econ { color: #1a5c1a; }
        .badge-politics { color: #c41e1e; }
        .badge-health, .badge-biotech { color: #5c1a5c; }
        .badge-science { color: #1a4a5c; }
        .badge-crypto { color: #5c4a1a; }
        .badge-sports { color: #2a5c1a; }
        .badge-entertainment { color: #5c1a1a; }
        .badge-education { color: #1a3a4a; }
        .badge-startups { color: #3a1a5c; }
        .badge-cybersecurity { color: #c41e1e; }
        .badge-sustainability { color: #1a5c3a; }
        .badge-oss { color: #2a4a1a; }

        /* ─────────── ARTICLE CARDS ─────────── */
        .article-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--ink-4);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.5rem;
        }
        .article-title {
            font-family: var(--serif);
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.01em;
        }
        .article-title a {
            color: var(--ink);
            text-decoration: none;
            transition: color 0.12s;
        }
        .article-title a:hover { color: var(--accent); }
        .article-summary {
            font-family: var(--sans);
            font-size: 1rem;
            color: var(--ink-3);
            line-height: 1.6;
            margin-top: 0.4rem;
        }
        .article-byline {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--ink-4);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 0.6rem;
        }

        /* ─────────── INTEREST CHIPS ─────────── */
        .chip-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.75rem 0;
        }
        .chip {
            font-family: var(--mono);
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 6px 14px;
            border: 1px solid var(--ink-4);
            background: transparent;
            color: var(--ink-3);
            cursor: pointer;
            transition: all 0.12s;
        }
        .chip:hover { border-color: var(--ink); color: var(--ink); }
        .chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--mono);
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 4px 10px;
            border: 1px solid var(--ink);
            background: var(--ink);
            color: var(--paper);
        }
        .tag-remove {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            background: rgba(255,255,255,0.2);
            color: var(--paper);
            font-size: 0.65rem;
            cursor: pointer;
            border: none;
            line-height: 1;
            transition: background 0.12s;
        }
        .tag-remove:hover { background: var(--accent); }

        /* ─────────── INPUT ─────────── */
        .input {
            width: 100%;
            padding: 0.65rem 1rem;
            font-family: var(--sans);
            font-size: 0.95rem;
            border: 2px solid var(--ink);
            background: var(--paper);
            color: var(--ink);
            outline: none;
            transition: border-color 0.12s;
        }
        .input:focus { border-color: var(--accent); }
        .input::placeholder { color: var(--ink-4); font-style: italic; }

        /* ─────────── UTILITIES ─────────── */
        .empty {
            text-align: center;
            color: var(--ink-4);
            font-family: var(--serif);
            font-style: italic;
            font-size: 1.2rem;
            padding: 4rem 1rem;
        }
        .msg {
            padding: 0.75rem 1rem;
            border-left: 3px solid var(--accent);
            background: var(--paper-2);
            font-family: var(--mono);
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
        .column-rule {
            border-left: 1px solid var(--ink-4);
        }
    </style>
</head>
<body>
    <!-- MASTHEAD -->
    <header class="masthead">
        <div class="masthead-top">
            <div class="masthead-meta">
                {% block masthead_left %}
                <div id="today-date" style="font-size:0.68rem;"></div>
                {% endblock %}
            </div>
            <a href="/" class="masthead-brand">Discovery</a>
            <div class="masthead-meta right">
                {% block masthead_right %}
                Personal&nbsp;Intelligence&nbsp;Feed
                {% endblock %}
            </div>
        </div>
        <nav class="masthead-nav">
            <div class="masthead-nav-inner">
                <a href="/">Today's Feed</a>
                <a href="/preferences">My Interests</a>
                {% block nav_extra %}{% endblock %}
            </div>
        </nav>
    </header>

    {% block full_width %}{% endblock %}

    <div class="page">
        {% block content %}{% endblock %}
    </div>

    <script>
        // Inject current date into masthead
        const d = new Date();
        const opts = {weekday:'long', year:'numeric', month:'long', day:'numeric'};
        const dateEl = document.getElementById('today-date');
        if (dateEl) dateEl.textContent = d.toLocaleDateString('en-US', opts);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
